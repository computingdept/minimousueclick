<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Phaser Scene Score Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #222;
    }
  </style>
</head>
<body>

<script>

/*
  ============================================================
  SCENE IDEA
  ============================================================

  We have two scenes:

  1. MainScene
     - red cube
     - WASD movement
     - press E to open clicker scene
     - shows clicker score in the top right

  2. MouseClickerScene
     - click button
     - increases score
     - press ESC to return to MainScene

  To pass the score between scenes, we use:

  this.registry

  The registry is shared across the whole Phaser game.

  So MouseClickerScene can save a value:

  this.registry.set("clickerScore", this.score);

  And MainScene can read it:

  this.registry.get("clickerScore");
*/


class MainScene extends Phaser.Scene {

  constructor() {
    super("MainScene");
  }

  create() {
    this.cameras.main.setBackgroundColor("#eeeeee");

    // Red cube player
    this.player = this.add.rectangle(400, 300, 50, 50, 0xff0000);

    // WASD and E controls
    this.keys = this.input.keyboard.addKeys({
      up: "W",
      left: "A",
      down: "S",
      right: "D",
      interact: "E"
    });

    this.add.text(20, 20, "WASD = move\nPress E = open mouse clicker", {
      fontSize: "24px",
      color: "#000000"
    });

    /*
      Read the clicker score from the registry.

      If the player has not played the clicker yet,
      there may not be a score saved.

      So we use || 0.

      This means:
      "Use the saved score, or use 0 if there is no score yet."
    */
    const savedClickerScore = this.registry.get("clickerScore") || 0;

    /*
      Create score text in the top right.

      x = 780 means near the right side of an 800px wide screen.

      setOrigin(1, 0) means:
      - align the right edge of the text to x = 780
      - align the top edge of the text to y = 20

      This makes it sit neatly in the top right.
    */
    this.clickerScoreText = this.add.text(
      780,
      20,
      "Clicker Score: " + savedClickerScore,
      {
        fontSize: "24px",
        color: "#000000"
      }
    ).setOrigin(1, 0);
  }

  update() {
    const speed = 4;

    if (this.keys.left.isDown) {
      this.player.x -= speed;
    }

    if (this.keys.right.isDown) {
      this.player.x += speed;
    }

    if (this.keys.up.isDown) {
      this.player.y -= speed;
    }

    if (this.keys.down.isDown) {
      this.player.y += speed;
    }

    /*
      Press E to open the clicker scene.
    */
    if (Phaser.Input.Keyboard.JustDown(this.keys.interact)) {
      this.scene.start("MouseClickerScene");
    }
  }
}


class MouseClickerScene extends Phaser.Scene {

  constructor() {
    super("MouseClickerScene");
  }

  create() {
    this.cameras.main.setBackgroundColor("#ffffff");

    /*
      Load the current score from the registry.

      This means if the player leaves the clicker scene
      and comes back later, the score is not reset.
    */
    this.score = this.registry.get("clickerScore") || 0;

    this.add.text(20, 20, "Mouse Clicker Mini Game", {
      fontSize: "32px",
      color: "#000000"
    });

    this.scoreText = this.add.text(20, 70, "Clicks: " + this.score, {
      fontSize: "28px",
      color: "#000000"
    });

    // Blue clickable button
    this.clickButton = this.add.rectangle(400, 300, 200, 120, 0x00aaee);
    this.clickButton.setInteractive();

    this.buttonText = this.add.text(400, 300, "CLICK ME", {
      fontSize: "28px",
      color: "#ffffff"
    }).setOrigin(0.5);

    /*
      When the player clicks the button:

      1. Increase the scene score
      2. Update the text in this scene
      3. Save the new score to the shared registry
    */
    this.clickButton.on("pointerdown", () => {
      this.score++;

      this.scoreText.setText("Clicks: " + this.score);

      /*
        This saves the score so MainScene can read it later.
      */
      this.registry.set("clickerScore", this.score);
    });

    this.add.text(20, 540, "Press ESC to go back", {
      fontSize: "22px",
      color: "#000000"
    });

    this.escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
  }

  update() {
    if (Phaser.Input.Keyboard.JustDown(this.escKey)) {

      /*
        Before going back, save the latest score again.

        This is useful as a safety step.
      */
      this.registry.set("clickerScore", this.score);

      /*
        Return to the main scene.

        MainScene will run create() again and read the saved score.
      */
      this.scene.start("MainScene");
    }
  }
}


const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: "#eeeeee",
  scene: [MainScene, MouseClickerScene]
};

const game = new Phaser.Game(config);

</script>

</body>
</html>
