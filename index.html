<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Phaser E Key Scene Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #222;
    }
  </style>
</head>
<body>

<script>
class MainScene extends Phaser.Scene {
  constructor() {
    super("MainScene");
  }

  create() {
    // Plain screen background
    this.cameras.main.setBackgroundColor("#eeeeee");

    // Red cube player
    this.player = this.add.rectangle(400, 300, 50, 50, 0xff0000);

    // Keyboard controls
    this.keys = this.input.keyboard.addKeys({
      up: "W",
      left: "A",
      down: "S",
      right: "D",
      interact: "E"
    });

    // Instruction text
    this.add.text(20, 20, "WASD = move\nPress E = open mouse clicker", {
      fontSize: "24px",
      color: "#000000"
    });
  }

  update() {
    const speed = 4;

    if (this.keys.left.isDown) {
      this.player.x -= speed;
    }

    if (this.keys.right.isDown) {
      this.player.x += speed;
    }

    if (this.keys.up.isDown) {
      this.player.y -= speed;
    }

    if (this.keys.down.isDown) {
      this.player.y += speed;
    }

    // Press E to open the clicker scene
    if (Phaser.Input.Keyboard.JustDown(this.keys.interact)) {
      this.scene.start("MouseClickerScene");
    }
  }
}

class MouseClickerScene extends Phaser.Scene {
  constructor() {
    super("MouseClickerScene");
  }

  create() {
    this.cameras.main.setBackgroundColor("#ffffff");

    this.score = 0;

    this.add.text(20, 20, "Mouse Clicker Mini Game", {
      fontSize: "32px",
      color: "#000000"
    });

    this.scoreText = this.add.text(20, 70, "Clicks: 0", {
      fontSize: "28px",
      color: "#000000"
    });

    // Big clickable button
    this.clickButton = this.add.rectangle(400, 300, 200, 120, 0x00aaee);
    this.clickButton.setInteractive();

    this.buttonText = this.add.text(400, 300, "CLICK ME", {
      fontSize: "28px",
      color: "#ffffff"
    }).setOrigin(0.5);

    // Mouse click event
    this.clickButton.on("pointerdown", () => {
      this.score++;
      this.scoreText.setText("Clicks: " + this.score);
    });

    this.add.text(20, 540, "Press ESC to go back", {
      fontSize: "22px",
      color: "#000000"
    });

    this.escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
  }

  update() {
    if (Phaser.Input.Keyboard.JustDown(this.escKey)) {
      this.scene.start("MainScene");
    }
  }
}

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: "#eeeeee",
  scene: [MainScene, MouseClickerScene]
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
